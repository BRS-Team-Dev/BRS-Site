name: Build CMS

# Builds the CMS artifact (Angular dist + composer vendor) and force-pushes the
# result to a deployed-{env} branch. The Hostinger server's cron job pulls from
# that branch — we never SSH from CI to Hostinger (their brute-force protection
# blocks Azure-based runner IPs).

on:
  push:
    branches: [dev, main]
    paths:
      - 'cms/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      target:
        description: "Environment to build for"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]

concurrency:
  group: build-${{ github.event.inputs.target || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to force-push deployed-{env} branch

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve target env
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.target }}" ]; then
            T="${{ github.event.inputs.target }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            T=prod
          else
            T=dev
          fi
          if [ "$T" = "prod" ]; then NG=production; else NG=dev; fi
          echo "target=$T" >> "$GITHUB_OUTPUT"
          echo "ng_config=$NG" >> "$GITHUB_OUTPUT"
          echo "Building for $T (ng configuration: $NG)"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, mbstring, openssl, fileinfo, curl, zip
          tools: composer:v2
          coverage: none

      - name: Composer install (cms/api)
        working-directory: cms/api
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: cms/frontend/package-lock.json

      - name: npm ci (cms/frontend)
        working-directory: cms/frontend
        run: npm ci

      - name: Angular build (${{ steps.vars.outputs.ng_config }})
        working-directory: cms/frontend
        run: npx ng build --configuration=${{ steps.vars.outputs.ng_config }}

      # --- Assemble the server-shaped artifact tree under _artifact/ ---
      # Mirrors what the server's rsync expects:
      #   api/  (with vendor/)
      #   db/
      #   index.php
      #   .htaccess.deploy → renamed to .htaccess at deploy time on the server
      #   dist/  (flattened from cms/frontend/dist/builtrightstudio/browser/)
      - name: Assemble artifact
        run: |
          set -e
          ART=_artifact
          rm -rf "$ART" && mkdir -p "$ART"
          cp -a cms/api "$ART/"
          cp -a cms/db  "$ART/"
          cp -a cms/index.php "$ART/"
          cp -a cms/.htaccess.deploy "$ART/"
          mkdir -p "$ART/dist"
          cp -a cms/frontend/dist/builtrightstudio/browser/. "$ART/dist/"
          ls -la "$ART"
          du -sh "$ART"

      # Orphan-history branch containing ONLY the artifact tree at its root.
      # Server clones this branch and rsyncs its contents into cc/.
      - name: Publish to deployed-${{ steps.vars.outputs.target }}
        env:
          BRANCH: deployed-${{ steps.vars.outputs.target }}
          SHA: ${{ github.sha }}
        run: |
          set -e
          mkdir publish
          cp -a _artifact/. publish/
          cd publish
          git init -q -b "$BRANCH"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "*.log" > .gitignore
          git add -A
          git commit -q -m "deploy: ${SHA::7} ($BRANCH)"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push -f -q origin "$BRANCH"
          echo "Pushed $(git rev-parse HEAD) to $BRANCH"
